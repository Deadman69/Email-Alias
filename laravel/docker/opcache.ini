; Production OPcache settings for EmailAlias
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; Disable file-change polling for speed. After deploying a new image,
; the new container has a fresh OPcache — no manual clear needed.
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1
