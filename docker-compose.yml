services:

  # ── Application Laravel ──────────────────────────────────────────────────────
  app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web
    labels:
      caddy: "${APP_URL}"
      caddy.reverse_proxy: "{{upstreams 9000}}"

  # ── SMTP Receiver ────────────────────────────────────────────────────────────
  smtp-server:
    build:
      context: ./smtp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SMTP_RECEIVER_PORT:-25}:25"
    environment:
      - LARAVEL_INBOUND_URL=http://app:9000/internal/inbound
      - SMTP_INTERNAL_SECRET=${SMTP_INTERNAL_SECRET}
      - SMTP_ALLOWED_DOMAIN=${SMTP_ALLOWED_DOMAIN:-}
      - NODE_ENV=production
    depends_on:
      - app
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── WebSocket (Laravel Reverb) ────────────────────────────────────────────────
  reverb:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      # Tune REVERB_MAX_CONNECTIONS based on available memory (~2 MB per connection).
      # For >500 concurrent users, run multiple replicas behind a sticky-session load balancer.
      REVERB_MAX_CONNECTIONS: "${REVERB_MAX_CONNECTIONS:-1000}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web
    labels:
      caddy: "${APP_URL}"
      caddy.handle_path: "/app/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8080}}"
      # Sticky-session hint — enable when running multiple Reverb replicas:
      # caddy.handle_path.reverse_proxy.lb_policy: "cookie"

  # ── Queue Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Scheduler (cron) ──────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Base de données ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-emailalias}
      POSTGRES_USER: ${DB_USERNAME:-emailalias}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_db_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-emailalias}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Object Storage (MinIO — S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-emailalias}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backup automatique PostgreSQL ─────────────────────────────────────────────
  # Dump quotidien, rétention 30 jours, fichiers stockés dans le volume backup_data.
  # Pour restaurer : docker compose run --rm backup pg_restore -h db -U $DB_USERNAME
  #                   -d $DB_DATABASE /backups/<fichier>.dump
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$$DB_PASSWORD pg_dump \
            -Fc -h db -U $$DB_USERNAME $$DB_DATABASE \
            > /backups/emailalias_$$(date +%Y%m%d_%H%M%S).dump
          find /backups -name '*.dump' -mtime +30 -delete
          sleep 86400
        done
    environment:
      DB_USERNAME: ${DB_USERNAME:-emailalias}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_db_password}
      DB_DATABASE: ${DB_DATABASE:-emailalias}
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── Prometheus (scraper de métriques) ─────────────────────────────────────────
  # Optionnel — commenter ce service si vous n'utilisez pas Prometheus.
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    depends_on:
      - app

  # ── Reverse Proxy (Caddy — HTTPS automatique) ─────────────────────────────────
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
    networks:
      - web

volumes:
  postgres_data:
  laravel_storage:
  caddy_data:
  minio_data:
  backup_data:
  prometheus_data:

networks:
  internal:
    internal: true
  web:
