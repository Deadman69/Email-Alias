services:

  # This container serves to copy data from app to nginx
  init-app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -c
      - cp -R /var/www/html/. /shared
    volumes:
      - app_data:/shared

  # ── Application Laravel ──────────────────────────────────────────────────────
  app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - app_data:/var/www/html
      - laravel_storage:/var/www/html/storage
    depends_on:
      init-app:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m

  # ── SMTP Receiver ────────────────────────────────────────────────────────────
  smtp-server:
    build:
      context: ./smtp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SMTP_RECEIVER_PORT:-25}:2525"
    environment:
      # Must point to an HTTP endpoint.
      # HTTP→FastCGI proxying; smtp-server needs to be on the web network to reach it.
      - LARAVEL_INBOUND_URL=http://nginx/internal/inbound
      - SMTP_INTERNAL_SECRET=${SMTP_INTERNAL_SECRET}
      - NODE_ENV=production
      # Allowed domains are fetched dynamically from Laravel — no static env var needed.
    depends_on:
      - app
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    memswap_limit: 256m

  # ── WebSocket (Laravel Reverb) ────────────────────────────────────────────────
  reverb:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      # Tune REVERB_MAX_CONNECTIONS based on available memory (~2 MB per connection).
      # For >500 concurrent users, run multiple replicas behind a sticky-session load balancer.
      REVERB_MAX_CONNECTIONS: "${REVERB_MAX_CONNECTIONS:-1000}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # ~2 MB per WebSocket connection; align this limit with REVERB_MAX_CONNECTIONS
    mem_limit: 256m
    memswap_limit: 256m

  # ── Queue Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # --max-jobs and --max-time: recycle the worker process periodically to
    # prevent PHP memory leaks from accumulating over long-running workers.
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-jobs=500", "--max-time=3600"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    mem_limit: 512m
    memswap_limit: 512m

  # ── Scheduler (cron) ──────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # artisan runs in the foreground (no &) so Docker detects non-zero exits.
    # Sleep only the remaining time after artisan finishes to avoid drift.
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          START=$$(date +%s)
          php artisan schedule:run --verbose --no-interaction
          ELAPSED=$$(( $$(date +%s) - START ))
          WAIT=$$(( 60 - ELAPSED ))
          if [ $$WAIT -gt 0 ]; then sleep $$WAIT; fi
        done
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    mem_limit: 256m
    memswap_limit: 256m

  # ── Database ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-emailalias}
      POSTGRES_USER: ${DB_USERNAME:-emailalias}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_db_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-emailalias}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    mem_limit: 256m
    memswap_limit: 256m

  # ── Object Storage (MinIO — S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-emailalias}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    memswap_limit: 256m

  # ── Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_data:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - reverb
    networks:
      - web
      - internal

volumes:
  app_data:
  postgres_data:
  laravel_storage:
  minio_data:

networks:
  internal:
    internal: true
  web:
  # Used for ./authentik/docker-compose.yml
  shared-auth:
    external: true
