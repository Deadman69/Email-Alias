services:

  app:
    build:
      context: ./laravel
      dockerfile: Dockerfile.dev
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - ./laravel:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    # Port 9000 is PHP-FPM (FastCGI), NOT HTTP — access the app via nginx on port 8000.

  # nginx sits in front of PHP-FPM and speaks plain HTTP on port 8000.
  # This replaces the broken "8000:9000" mapping that exposed the FPM socket directly.
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./laravel:/var/www/html:ro
      - ./laravel/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - app
    networks:
      - internal

  smtp-server:
    build:
      context: ./smtp-server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      # nginx (internal network) handles HTTP→FPM — never call FPM port 9000 directly.
      - LARAVEL_INBOUND_URL=http://nginx/internal/inbound
    volumes:
      - ./smtp-server/src:/app/src
    ports:
      - "2525:25"   # Port non-privilégié pour le dev local

  # Caddy is not useful in dev (no domain, no SSL). Disable port binding to avoid
  # conflicts; it keeps running but is bypassed in favour of the nginx service above.
  caddy:
    ports: []

  reverb:
    ports:
      - "8080:8080"

  db:
    ports:
      - "5432:5432"   # Accès direct à la BDD pour les outils (TablePlus, DBeaver...)

  minio:
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web MinIO

  backup:
    environment:
      - DB_USERNAME=${DB_USERNAME:-emailalias}
      - DB_PASSWORD=${DB_PASSWORD:-changeme_db_password}
      - DB_DATABASE=${DB_DATABASE:-emailalias}
